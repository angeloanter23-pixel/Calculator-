<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neumorphic Calculator</title>
  <link href="./src/style.css" rel="stylesheet">
  <!-- Fallback to Tailwind CDN if running without build step -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'neu-bg': '#e0e5ec',
            'neu-text': '#4a5568',
            'neu-accent': '#3182ce'
          },
          boxShadow: {
            'neu': '9px 9px 16px rgba(163, 177, 198, 0.6), -9px -9px 16px rgba(255, 255, 255, 0.5)',
            'neu-inner': 'inset 6px 6px 10px 0 rgba(163, 177, 198, 0.7), inset -6px -6px 10px 0 rgba(255, 255, 255, 0.8)'
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer components {
      .btn-neu {
        @apply bg-neu-bg text-neu-text font-bold rounded-2xl shadow-neu transition-all duration-200 ease-in-out flex items-center justify-center text-2xl select-none cursor-pointer h-16 w-full hover:bg-opacity-80 active:shadow-neu-inner active:text-neu-accent;
      }
    }
  </style>
</head>
<body class="bg-neu-bg text-neu-text min-h-screen flex items-center justify-center p-4">
  
  <div class="bg-neu-bg p-8 rounded-[2rem] shadow-neu w-full max-w-sm">
    <!-- Calculator Display -->
    <div class="mb-8">
      <div id="display" class="bg-neu-bg text-neu-text font-mono rounded-2xl shadow-neu-inner p-6 text-right text-4xl w-full overflow-x-auto whitespace-nowrap scrollbar-hide flex items-center justify-end h-24">
        0
      </div>
    </div>
    
    <!-- Calculator Buttons Grid -->
    <div class="grid grid-cols-4 gap-6">
      <!-- Row 1 -->
      <button class="btn-neu text-red-400" onclick="clearDisplay()">C</button>
      <button class="btn-neu text-red-400" onclick="deleteLast()">DEL</button>
      <button class="btn-neu text-neu-accent" onclick="appendOperator('/')">÷</button>
      <button class="btn-neu text-neu-accent" onclick="appendOperator('*')">×</button>
      
      <!-- Row 2 -->
      <button class="btn-neu" onclick="appendNumber('7')">7</button>
      <button class="btn-neu" onclick="appendNumber('8')">8</button>
      <button class="btn-neu" onclick="appendNumber('9')">9</button>
      <button class="btn-neu text-neu-accent" onclick="appendOperator('-')">−</button>
      
      <!-- Row 3 -->
      <button class="btn-neu" onclick="appendNumber('4')">4</button>
      <button class="btn-neu" onclick="appendNumber('5')">5</button>
      <button class="btn-neu" onclick="appendNumber('6')">6</button>
      <button class="btn-neu text-neu-accent" onclick="appendOperator('+')">+</button>
      
      <!-- Row 4 & 5 (Equal button spans two rows) -->
      <button class="btn-neu" onclick="appendNumber('1')">1</button>
      <button class="btn-neu" onclick="appendNumber('2')">2</button>
      <button class="btn-neu" onclick="appendNumber('3')">3</button>
      <button class="btn-neu text-neu-accent row-span-2 h-full" onclick="calculate()">=</button>
      
      <button class="btn-neu col-span-2 w-full px-6" onclick="appendNumber('0')">0</button>
      <button class="btn-neu" onclick="appendNumber('.')">.</button>
    </div>
  </div>

  <script src="./src/script.js"></script>
</body>
</html>
